  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #020406;
      font-family: "IBM Plex Mono", "JetBrains Mono", "Courier New", monospace;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background photo ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: url('hero-antologia-onde-se-guarda.png') 50% 35% / cover no-repeat;
    }
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(110deg, rgba(2,4,6,.82) 0%, rgba(2,4,6,.54) 48%, rgba(2,4,6,.38) 100%),
        linear-gradient(180deg, rgba(2,4,6,.45) 0%, rgba(2,4,6,.72) 100%);
    }

    /* ── Scanlines ── */
    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px);
      background-size: 100% 4px;
      opacity: 0.35;
    }

    /* ── Logo centrado ── */
    .logo {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20; pointer-events: none;
      text-align: center;
    }
    .logo img {
      width: clamp(160px, 18vw, 280px);
      height: auto;
      filter: drop-shadow(0 0 32px rgba(184,170,143,.28));
    }

    /* ── Cross dividers — invisible ── */
    .vline, .hline { display: none; }

    /* ── Navigation grid (4 quadrants) ── */
    .grid {
      position: fixed; inset: 0; z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }

    .quad {
      position: relative;
      display: flex;
      padding: clamp(28px, 5vw, 64px);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: background 0.28s ease;
    }

    /* Corner positioning */
    .quad-tl { align-items: flex-start; justify-content: flex-start; padding-top: clamp(80px, 10vh, 140px); }
    .quad-tr { align-items: flex-start; justify-content: flex-end;  padding-top: clamp(80px, 10vh, 140px); }
    .quad-bl { align-items: flex-end;   justify-content: flex-start; }
    .quad-br { align-items: flex-end;   justify-content: flex-end; }

    /* Hover area glow */
    .quad::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at var(--ox, 50%) var(--oy, 50%), rgba(184,170,143,.09), transparent 68%);
      opacity: 0;
      transition: opacity 0.32s ease;
    }
    .quad:hover::before { opacity: 1; }
    .quad:hover { background: rgba(184,170,143,.03); }

    /* Corner border on hover */
    .quad::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: rgba(216,203,178,.5);
      border-style: solid;
      opacity: 0;
      transition: opacity 0.25s ease, width 0.25s ease, height 0.25s ease;
    }
    .quad-tl::after { top: 0; left: 0; border-width: 1px 0 0 1px; }
    .quad-tr::after { top: 0; right: 0; border-width: 1px 1px 0 0; }
    .quad-bl::after { bottom: 0; left: 0; border-width: 0 0 1px 1px; }
    .quad-br::after { bottom: 0; right: 0; border-width: 0 1px 1px 0; }
    .quad:hover::after { opacity: 1; width: 44px; height: 44px; }

    /* Label block */
    .label {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; gap: 7px;
    }
    .label-right { align-items: flex-end; text-align: right; }

    .q-num {
      font-size: clamp(9px, 0.9vw, 11px);
      color: rgba(184,170,143,.45);
      letter-spacing: .24em;
      text-transform: uppercase;
    }

    .q-name {
      font-size: clamp(15px, 2.2vw, 28px);
      color: rgba(216,221,228,.68);
      letter-spacing: .2em;
      text-transform: uppercase;
      font-weight: 400;
      line-height: 1;
      transition: color 0.25s, text-shadow 0.25s;
    }
    .quad:hover .q-name {
      color: rgba(216,221,228,1);
      text-shadow: 0 0 32px rgba(184,170,143,.55);
    }

    .q-desc {
      font-size: clamp(9px, 0.9vw, 11px);
      color: rgba(157,148,132,.5);
      letter-spacing: .12em;
      text-transform: uppercase;
      line-height: 1.55;
      transition: color 0.25s;
      max-width: 200px;
    }
    .quad:hover .q-desc { color: rgba(157,148,132,.85); }

    /* ── Status bar ── */
    .status {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; gap: 18px;
      padding: 13px 36px;
      font-size: clamp(9px, 0.85vw, 11px);
      letter-spacing: .18em; text-transform: uppercase;
      color: rgba(184,170,143,.4);
      border-top: 1px solid rgba(216,203,178,.1);
      background: rgba(2,4,6,.52);
      backdrop-filter: blur(12px);
    }
    .status-dot {
      width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
      background: #b44a3d;
      box-shadow: 0 0 7px #b44a3d;
      animation: blink 2s ease-in-out infinite;
    }
    .status-sep { opacity: .25; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.28} }

    /* ── Glitch: logo chromatic aberration ── */
    @keyframes logoGlitch {
      0%   { filter: drop-shadow(0 0 32px rgba(184,170,143,.28)); transform: translate(0,0) scaleX(1); }
      10%  { filter: drop-shadow(-4px 0 rgba(255,0,80,.8)) drop-shadow(4px 0 rgba(226,218,200,.6)); transform: translate(-3px,0) scaleX(1.005); }
      20%  { filter: drop-shadow(4px 0 rgba(255,0,80,.6)) drop-shadow(-3px 0 rgba(226,218,200,.8)); transform: translate(3px,1px) scaleX(.998); }
      30%  { filter: drop-shadow(0 0 28px rgba(184,170,143,.18)); transform: translate(0,0); }
      40%  { filter: drop-shadow(-2px 0 rgba(255,0,80,.5)) drop-shadow(2px 0 rgba(226,218,200,.5)); transform: translate(-1.5px,-.5px); }
      50%  { filter: drop-shadow(0 0 44px rgba(184,170,143,.42)) drop-shadow(0 0 6px rgba(255,255,255,.18)); transform: translate(1px,.5px); }
      60%  { filter: drop-shadow(-3px 0 rgba(255,0,80,.35)) drop-shadow(3px 0 rgba(226,218,200,.35)); transform: translate(-1px,0); }
      70%  { filter: drop-shadow(0 0 32px rgba(184,170,143,.28)); transform: translate(0,0); }
      100% { filter: drop-shadow(0 0 32px rgba(184,170,143,.28)); transform: translate(0,0); }
    }
    .logo.glitch img {
      animation: logoGlitch 0.55s steps(1) 1 forwards;
    }

    /* ── Glitch: q-name tremor on hover ── */
    @keyframes nameTremor {
      0%,100% { transform: translate(0,0); letter-spacing: .2em; }
      12%     { transform: translate(-1.5px,.5px); letter-spacing: .21em; }
      24%     { transform: translate(1.5px,-.5px); letter-spacing: .19em; }
      37%     { transform: translate(-.5px,1px);   letter-spacing: .2em; }
      49%     { transform: translate(2px,0);        letter-spacing: .205em; }
      62%     { transform: translate(-1px,.5px);    letter-spacing: .195em; }
      75%     { transform: translate(.5px,-1px);    letter-spacing: .2em; }
      87%     { transform: translate(-2px,0);       letter-spacing: .21em; }
    }
    .quad:hover .q-name {
      color: rgba(216,221,228,1);
      text-shadow: 0 0 32px rgba(184,170,143,.55);
      animation: nameTremor 0.11s steps(1) infinite;
    }
    /* q-desc subtle fade-in tremor */
    @keyframes descTremor {
      0%,100% { transform: translate(0,0); opacity:.85; }
      33%     { transform: translate(-1px,0); opacity:.75; }
      66%     { transform: translate(1px,.5px); opacity:.9; }
    }
    .quad:hover .q-desc {
      color: rgba(157,148,132,.85);
      animation: descTremor 0.18s steps(1) infinite;
    }

    /* ── Glitch flash overlay ── */
    #flash {
      position: fixed; inset: 0; z-index: 200;
      pointer-events: none; opacity: 0;
    }

    /* ── Fade-out to black ── */
    #fadeOut {
      position: fixed; inset: 0; z-index: 199;
      background: #020406;
      opacity: 0; pointer-events: none;
      transition: opacity 0.38s ease;
    }
    #fadeOut.active { opacity: 1; }



    /* ── Conversão direta ── */
    .home-cta {
      position: fixed; left: 50%; bottom: 58px; transform: translateX(-50%);
      z-index: 24; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
      pointer-events: auto;
    }
    .home-cta a {
      min-height: 42px; padding: 0 18px; display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid rgba(216,203,178,.32); background: rgba(2,4,6,.62);
      color: rgba(238,233,220,.92); text-decoration: none; text-transform: uppercase;
      font-size: 10px; letter-spacing: .18em; backdrop-filter: blur(10px);
    }
    .home-cta a:first-child { border-color: rgba(180,74,61,.62); color: #f0f4f8; background: rgba(180,74,61,.16); }
    .home-cta a:hover { background: rgba(184,170,143,.09); border-color: rgba(216,203,178,.5); }

    /* ── Mobile ── */
    @media (max-width: 740px) {
      .vline, .hline { display: none; }

      /* Foto exclusiva mobile, vertical */
      .bg {
        background: url('hero-antologia-onde-se-guarda.png') center 25% / cover no-repeat;
      }
      .bg::after {
        background:
          linear-gradient(180deg, rgba(2,4,6,.7) 0%, rgba(2,4,6,.35) 30%, rgba(2,4,6,.4) 55%, rgba(2,4,6,.85) 100%);
      }

      /* Logo no topo central, maior */
      .logo {
        top: 56px;
        left: 50%;
        transform: translate(-50%, 0);
      }
      .logo img {
        width: 180px;
        filter: drop-shadow(0 0 24px rgba(184,170,143,.45));
      }

      /* Grid: 4 linhas com tap target adequado, alinhadas no rodapé */
      .grid {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr 1fr 1fr;
        align-content: end;

      }
      .quad {
        padding: 18px 28px !important;
        min-height: 72px;
        align-items: center !important;

        border-top: 1px solid rgba(216,203,178,.08);
      }
      .quad:first-child { border-top: 0; }
      .quad::after { display: none; }
      .quad::before { display: none; }

      .home-cta { bottom: 52px; left: 18px; right: 18px; transform: none; }

      /* Status bar mobile */

      }
    }

    @media (min-width: 741px) and (max-width: 980px) {
      .q-name { font-size: clamp(14px, 2vw, 20px); }
    }
  </style>

  <script>
    // ── Live clock
    function pad(n) { return String(n).padStart(2, '0'); }
    function tick() {
      const now = new Date();
      const d = [pad(now.getDate()), pad(now.getMonth() + 1), now.getFullYear()].join('.');
      const t = [pad(now.getHours()), pad(now.getMinutes()), pad(now.getSeconds())].join(':');
      document.getElementById('statusDate').textContent = d;
      document.getElementById('statusTime').textContent = t;
    }
    tick();
    setInterval(tick, 1000);

    // ── Glitch-flash → fade-to-black → navigate
    const flash   = document.getElementById('flash');
    const fadeOut = document.getElementById('fadeOut');

    function glitchNavigate(dest) {
      // Sequence: 3 white flickers then black fade
      const seq = [
        { opacity: 0.22, delay: 0 },
        { opacity: 0,    delay: 55 },
        { opacity: 0.14, delay: 90 },
        { opacity: 0,    delay: 130 },
        { opacity: 0.08, delay: 160 },
        { opacity: 0,    delay: 195 },
      ];

      flash.style.background = '#fff';
      flash.style.mixBlendMode = 'screen';

      let step = 0;
      function next() {
        if (step >= seq.length) {
          fadeOut.classList.add('active');
          setTimeout(() => { window.location.href = dest; }, 400);
          return;
        }
        const s = seq[step++];
        flash.style.opacity = s.opacity;
        setTimeout(next, s.delay || 40);
      }
      next();
    }

    // ── Logo glitch on quad hover
    const logoEl = document.querySelector('.logo');
    let glitchLock = false;

    function triggerLogoGlitch() {
      if (glitchLock) return;
      glitchLock = true;
      logoEl.classList.remove('glitch');
      void logoEl.offsetWidth; // force reflow so animation restarts
      logoEl.classList.add('glitch');
      setTimeout(() => { logoEl.classList.remove('glitch'); glitchLock = false; }, 600);
    }

    // Intercept clicks for effect
    document.querySelectorAll('.quad').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        glitchNavigate(this.getAttribute('href'));
      });

      // Logo glitch on enter
      link.addEventListener('mouseenter', triggerLogoGlitch);

      // Radial glow follows cursor inside quadrant
      link.addEventListener('mousemove', function(e) {
        const r = this.getBoundingClientRect();
        const ox = ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%';
        const oy = ((e.clientY - r.top)  / r.height * 100).toFixed(1) + '%';
        this.style.setProperty('--ox', ox);
        this.style.setProperty('--oy', oy);
      });
    });
  </script>


</body>
