<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMORFA | Transmissões</title>
  <meta name="description" content="Fragmentos, versos, poemas e transmissões de AMORFA." />
  <meta name="theme-color" content="#000000" />
  <link rel="canonical" href="https://amorfa.online/transmissoes.html" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:#000;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);
      --text:#f2f0ed;--muted:#77726f;--soft:#aaa29e;
      --magenta:#930043;--magenta2:#d00066;--cyan:#008293;--cyan2:#00d7ef;
      --font-serif:'Cinzel','Times New Roman',serif;
      --font-body:'Cormorant Garamond',Georgia,serif;
      --font-mono:'Courier New',Courier,monospace;
      --sw:220px;--hh:62px;
    }
    *{box-sizing:border-box;cursor:crosshair;}
    html{scroll-behavior:smooth;background:var(--black);color:var(--text);}
    body{margin:0;min-height:100vh;background:#000;font-family:var(--font-body);overflow-x:hidden;}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
      background:linear-gradient(rgba(255,255,255,0) 50%,rgba(0,0,0,.34) 50%),
      linear-gradient(90deg,rgba(147,0,67,.045),rgba(0,130,147,.03),rgba(255,255,255,.018));
      background-size:100% 4px,6px 100%;mix-blend-mode:screen;opacity:.62;}
    body::after{content:"";position:fixed;inset:-20%;pointer-events:none;z-index:9998;opacity:.055;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation:grain 1.2s steps(3) infinite;}
    @keyframes grain{0%{transform:translate(0,0)}33%{transform:translate(2%,-1%)}66%{transform:translate(-1%,2%)}100%{transform:translate(0,0)}}
    a{color:inherit;text-decoration:none;}

    /* NAV */
    header{position:fixed;inset:0 0 auto 0;z-index:3000;height:var(--hh);background:#000;border-bottom:1px solid var(--line2);display:flex;align-items:center;}
    .nav{width:100%;padding:0 4vw;display:flex;align-items:center;justify-content:space-between;gap:26px;}
    .brand{font-family:var(--font-serif);font-size:1.38rem;letter-spacing:.45em;position:relative;}
    .brand::after{content:"";position:absolute;left:0;bottom:-9px;width:44px;height:1px;background:linear-gradient(90deg,var(--magenta),transparent);}
    nav ul{margin:0;padding:0;display:flex;list-style:none;gap:30px;}
    nav a{font-family:var(--font-serif);font-size:.72rem;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);transition:.25s ease;}
    nav a:hover,nav a.active{color:var(--text);text-shadow:0 0 12px rgba(0,215,239,.45);}
    nav a.active{border-bottom:1px solid var(--magenta);padding-bottom:2px;}
    .menu-toggle{display:none;border:1px solid var(--line2);background:#000;color:var(--text);padding:10px 13px;font-size:1rem;cursor:pointer;}

    /* LAYOUT */
    .tx-layout{display:grid;grid-template-columns:var(--sw) 1fr;min-height:100vh;padding-top:var(--hh);}

    /* SIDEBAR — FIXED */
    .tx-sidebar{
      position:fixed;top:var(--hh);left:0;
      width:var(--sw);height:calc(100vh - var(--hh));
      border-right:1px solid var(--line2);
      display:flex;flex-direction:column;
      padding:52px 0 36px;
      overflow-y:auto;
      z-index:200;
      background:#000;
    }
    .tx-title-vert{
      writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);
      font-family:var(--font-serif);font-size:clamp(1.8rem,2.8vw,2.6rem);
      font-weight:400;letter-spacing:.22em;text-transform:uppercase;
      color:var(--text);text-shadow:2px 0 var(--magenta),-1px 0 rgba(0,215,239,.4);
      padding:0 30px;margin-bottom:52px;line-height:1;
      flex-shrink:0;
    }
    .tx-kicker{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);padding:0 30px;margin-bottom:36px;flex-shrink:0;}
    .filter-group{display:flex;flex-direction:column;gap:2px;padding:0 22px;flex-shrink:0;}
    .filter-label{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);padding:0 8px;margin-bottom:10px;}
    .filter-btn{appearance:none;border:none;background:transparent;color:var(--muted);font-family:var(--font-mono);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;padding:11px 8px;text-align:left;cursor:pointer;transition:.2s ease;border-left:2px solid transparent;}
    .filter-btn:hover{color:var(--text);border-left-color:rgba(255,255,255,.2);}
    .filter-btn.active{color:var(--text);border-left-color:var(--magenta);background:rgba(147,0,67,.07);}
    .tx-count{margin-top:auto;padding:0 30px;font-family:var(--font-mono);font-size:.6rem;letter-spacing:.18em;color:var(--muted);flex-shrink:0;}

    /* MAIN */
    .tx-main{margin-left:var(--sw);min-height:calc(100vh - var(--hh));}
    .tx-list{list-style:none;margin:0;padding:0;}

    /* ENTRY ROW */
    .tx-entry{border-bottom:1px solid var(--line);overflow:hidden;}
    .tx-row{display:grid;grid-template-columns:80px 92px 1fr 22px;align-items:center;gap:0 20px;padding:20px 48px 20px 40px;cursor:pointer;transition:background .18s ease;position:relative;}
    .tx-row::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--magenta);transform:scaleY(0);transform-origin:top;transition:transform .25s ease;}
    .tx-row:hover{background:rgba(255,255,255,.016);}
    .tx-entry.open>.tx-row::before{transform:scaleY(1);}
    .tx-entry.open>.tx-row{background:rgba(147,0,67,.04);}
    .tx-id{font-family:var(--font-mono);font-size:.67rem;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;}
    .tx-badge{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;padding:4px 8px;border:1px solid;width:fit-content;}
    .tx-entry[data-type="fragmento"]  .tx-badge{color:var(--magenta2);border-color:rgba(208,0,102,.35);background:rgba(208,0,102,.05);}
    .tx-entry[data-type="poema"]      .tx-badge{color:var(--soft);border-color:rgba(170,162,158,.28);background:rgba(170,162,158,.04);}
    .tx-entry[data-type="verso"]      .tx-badge{color:var(--cyan2);border-color:rgba(0,215,239,.28);background:rgba(0,215,239,.04);}
    .tx-entry[data-type="personagem"] .tx-badge{color:var(--cyan);border-color:rgba(0,130,147,.45);background:rgba(0,130,147,.06);}
    .tx-preview{font-family:var(--font-body);font-size:1.06rem;color:var(--soft);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tx-entry.open>.tx-row .tx-preview{color:var(--text);}
    .tx-chev{font-size:.68rem;color:var(--muted);transition:transform .22s ease;font-family:var(--font-mono);text-align:right;}
    .tx-entry.open>.tx-row .tx-chev{transform:rotate(180deg);color:var(--magenta);}

    /* EXPANDED */
    .tx-body-wrap{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1);}
    .tx-entry.open .tx-body-wrap{max-height:3000px;}
    .tx-body-inner{padding:0 48px 44px 40px;border-top:1px solid var(--line);}

    /* IMAGE */
    .tx-image{width:100%;max-width:720px;margin:32px 0 28px;overflow:hidden;border:1px solid var(--line);}
    .tx-image img{width:100%;height:auto;display:block;filter:grayscale(15%) contrast(1.05) brightness(.9);transition:filter .3s ease;}
    .tx-image img:hover{filter:grayscale(0%) contrast(1.02) brightness(.95);}

    .tx-post-title{font-family:var(--font-serif);font-size:clamp(1.3rem,2.2vw,1.9rem);font-weight:400;letter-spacing:.1em;text-transform:uppercase;margin:32px 0 20px;line-height:1.14;}
    .tx-has-image .tx-post-title{margin-top:0;}

    .tx-body-text{font-family:var(--font-body);font-size:clamp(1.12rem,1.7vw,1.4rem);line-height:1.58;color:rgba(242,240,237,.88);max-width:680px;}
    .tx-body-text p{margin:0 0 .45em;}
    .tx-body-text p:last-child{margin-bottom:0;}
    .tx-entry[data-type="personagem"] .tx-body-text{font-style:italic;color:rgba(242,240,237,.75);border-left:1px solid rgba(0,130,147,.35);padding-left:24px;}
    .tx-entry[data-type="verso"] .tx-body-text{font-family:var(--font-mono);font-size:clamp(.86rem,1.3vw,1.02rem);line-height:1.95;letter-spacing:.02em;}

    .tx-track{margin-top:28px;padding-top:18px;border-top:1px solid var(--line);font-family:var(--font-mono);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:10px;}
    .tx-track::before{content:"";display:block;width:18px;height:1px;background:currentColor;}

    .tx-empty{display:none;padding:80px 48px;font-family:var(--font-mono);font-size:.78rem;letter-spacing:.2em;color:var(--muted);}
    .tx-empty.visible{display:block;}

    footer{border-top:1px solid var(--line);padding:32px 48px;margin-left:var(--sw);color:var(--muted);font-family:var(--font-serif);letter-spacing:.25em;text-transform:uppercase;font-size:.72rem;display:flex;justify-content:space-between;}
    .pulse{color:var(--magenta);animation:pulse 2.6s infinite;}
    @keyframes pulse{0%,100%{opacity:.42}50%{opacity:1;text-shadow:0 0 9px var(--magenta)}}

    /* MOBILE */
    @media(max-width:860px){
      :root{--sw:0px;}
      .tx-layout{grid-template-columns:1fr;}
      .tx-sidebar{position:sticky;top:var(--hh);width:100%;height:auto;flex-direction:row;flex-wrap:wrap;padding:14px 4vw;border-right:none;border-bottom:1px solid var(--line2);gap:8px;align-items:center;overflow:visible;}
      .tx-title-vert{writing-mode:horizontal-tb;transform:none;font-size:1rem;margin:0 16px 0 0;padding:0;letter-spacing:.3em;}
      .tx-kicker{display:none;}
      .filter-group{flex-direction:row;flex-wrap:wrap;padding:0;gap:6px;}
      .filter-label{display:none;}
      .filter-btn{padding:7px 12px;border:1px solid var(--line2);border-left:2px solid transparent;font-size:.6rem;}
      .filter-btn.active{border:1px solid var(--magenta);border-left:2px solid var(--magenta);}
      .tx-count{margin-top:0;padding:0;margin-left:auto;}
      .tx-main{margin-left:0;}
      .tx-row{grid-template-columns:58px 1fr 18px;padding:16px 4vw;gap:0 10px;}
      .tx-badge{display:none;}
      .tx-body-inner{padding:0 4vw 32px;}
      .tx-image{max-width:100%;}
      footer{margin-left:0;padding:24px 4vw;}
      .menu-toggle{display:inline-flex;}
      nav ul{position:fixed;top:0;right:-100%;width:min(82vw,360px);height:100vh;flex-direction:column;align-items:flex-start;justify-content:center;padding:44px;gap:28px;background:#000;border-left:1px solid var(--line2);transition:right .34s ease;z-index:4000;}
      nav ul.active{right:0;}
      nav a{font-size:.92rem;color:var(--text);}
    }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <a class="brand" href="index.html">AMORFA</a>
      <button class="menu-toggle" id="menuBtn">☰</button>
      <nav>
        <ul id="navMenu">
          <li><a href="index.html#inicio">Início</a></li>
          <li><a href="index.html#ouvir">Ouvir</a></li>
          <li><a href="index.html#lancamentos">Lançamentos</a></li>
          <li><a href="index.html#arquivo">Arquivo</a></li>
          <li><a href="transmissoes.html" class="active">Transmissões</a></li>
          <li><a href="index.html#sobre">Sobre</a></li>
          <li><a href="index.html#contato">Contato</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="tx-layout">
    <aside class="tx-sidebar">
      <div class="tx-title-vert">Transmissões</div>
      <div class="tx-kicker">AMORFA.online // arquivo vivo</div>
      <div class="filter-group">
        <div class="filter-label">Filtrar //</div>
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="fragmento">Fragmento</button>
        <button class="filter-btn" data-filter="poema">Poema</button>
        <button class="filter-btn" data-filter="verso">Verso</button>
        <button class="filter-btn" data-filter="personagem">Personagem</button>
      </div>
      <div class="tx-count" id="txCount"></div>
    </aside>

    <main class="tx-main">
      <ul class="tx-list" id="txList"></ul>
      <div class="tx-empty" id="txEmpty">// nenhuma transmissão nesta frequência</div>
    </main>
  </div>

  <footer>
    <span>AMORFA.online</span>
    <span class="pulse">transmissão em curso</span>
  </footer>

<script>
  const menuBtn = document.getElementById('menuBtn');
  const navMenu = document.getElementById('navMenu');
  menuBtn.addEventListener('click', () => {
    navMenu.classList.toggle('active');
    menuBtn.textContent = navMenu.classList.contains('active') ? '✕' : '☰';
  });
  navMenu.querySelectorAll('a').forEach(l => l.addEventListener('click', () => {
    navMenu.classList.remove('active'); menuBtn.textContent = '☰';
  }));

  const txList  = document.getElementById('txList');
  const txEmpty = document.getElementById('txEmpty');
  const txCount = document.getElementById('txCount');
  const filters = document.querySelectorAll('.filter-btn');

  function nl2p(str) {
    return str.split(/\n\n+/).map(b => '<p>' + b.replace(/\n/g,'<br>') + '</p>').join('');
  }
  function firstLine(t) { return t.split('\n')[0].replace(/[*_#]/g,'').trim(); }

  function renderEntry(post) {
    const hasTitulo = post.titulo && post.titulo.trim();
    const hasFaixa  = post.faixa  && post.faixa.trim();
    const hasImagem = post.imagem && post.imagem.trim();
    const preview   = hasTitulo ? post.titulo : firstLine(post.conteudo);
    return `
      <li class="tx-entry${hasImagem?' has-image':''}" data-type="${post.tipo}">
        <div class="tx-row" role="button" tabindex="0" aria-expanded="false">
          <span class="tx-id">${post.id}</span>
          <span class="tx-badge">${post.tipo.charAt(0).toUpperCase()+post.tipo.slice(1)}</span>
          <span class="tx-preview">${preview}</span>
          <span class="tx-chev">▾</span>
        </div>
        <div class="tx-body-wrap">
          <div class="tx-body-inner${hasImagem?' tx-has-image':''}">
            ${hasImagem ? `<div class="tx-image"><img src="${post.imagem}" alt="${hasTitulo?post.titulo:post.id}" loading="lazy"></div>` : ''}
            ${hasTitulo ? `<h2 class="tx-post-title">${post.titulo}</h2>` : ''}
            <div class="tx-body-text">${nl2p(post.conteudo)}</div>
            ${hasFaixa ? `<div class="tx-track">faixa relacionada: ${post.faixa}</div>` : ''}
          </div>
        </div>
      </li>`;
  }

  function filterBy(tipo) {
    const items = txList.querySelectorAll('.tx-entry');
    let count = 0;
    items.forEach(item => {
      const match = tipo === 'todos' || item.dataset.type === tipo;
      item.style.display = match ? '' : 'none';
      if (match) count++;
    });
    txEmpty.classList.toggle('visible', count === 0);
    txCount.textContent = count + ' transmiss' + (count !== 1 ? 'ões' : 'ão');
  }

  filters.forEach(btn => {
    btn.addEventListener('click', () => {
      filters.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterBy(btn.dataset.filter);
    });
  });

  txList.addEventListener('click', e => {
    const row = e.target.closest('.tx-row');
    if (!row) return;
    const entry = row.closest('.tx-entry');
    const isOpen = entry.classList.contains('open');
    txList.querySelectorAll('.tx-entry.open').forEach(el => {
      el.classList.remove('open');
      el.querySelector('.tx-row').setAttribute('aria-expanded','false');
    });
    if (!isOpen) {
      entry.classList.add('open');
      row.setAttribute('aria-expanded','true');
      setTimeout(() => entry.scrollIntoView({behavior:'smooth',block:'nearest'}), 50);
    }
  });

  txList.addEventListener('keydown', e => {
    if (e.key==='Enter'||e.key===' ') {
      const row = e.target.closest('.tx-row');
      if (row) { e.preventDefault(); row.click(); }
    }
  });

  fetch('transmissoes.json')
    .then(r => r.json())
    .then(data => {
      const posts = [...data.posts].reverse();
      txList.innerHTML = posts.map(renderEntry).join('');
      txCount.textContent = posts.length + ' transmissões';
    })
    .catch(() => {
      txEmpty.classList.add('visible');
      txEmpty.textContent = '// erro ao carregar transmissões';
    });
</script>
</body>
</html>
