*{box-sizing:border-box}html{scroll-behavior:smooth;background:#000;color:var(--text)}body{margin:0;background:#000;font-family:var(--body);overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;background:linear-gradient(rgba(255,255,255,0) 50%,rgba(0,0,0,.22) 50%),linear-gradient(90deg,rgba(147,0,67,.025),rgba(0,130,147,.018));background-size:100% 4px,7px 100%;mix-blend-mode:screen;opacity:.36}
body::after{content:"";position:fixed;inset:-20%;pointer-events:none;z-index:9998;opacity:.045;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:grain 1.4s steps(3) infinite}
@keyframes grain{0%{transform:translate(0,0)}33%{transform:translate(2%,-1%)}66%{transform:translate(-1%,2%)}100%{transform:translate(0,0)}}
a{color:inherit}
header{position:fixed;inset:0 0 auto;z-index:2000;background:rgba(0,0,0,.74);border-bottom:1px solid var(--line);backdrop-filter:blur(16px)}

.brand{font-family:var(--serif);font-size:1.32rem;letter-spacing:.45em;text-decoration:none}
.brand::after{content:"";display:block;width:42px;height:1px;background:rgba(208,0,102,.65);margin-top:8px}
nav ul{margin:0;padding:0;display:flex;list-style:none;gap:22px}
nav a{font-family:var(--serif);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:.2s}
nav a:hover,nav a.active{color:var(--text)}nav a.active{border-bottom:1px solid var(--m);padding-bottom:2px}
.menu-toggle{display:none;border:1px solid var(--line2);background:#000;color:var(--text);padding:10px 13px;font-size:1rem;cursor:pointer}
footer{border-top:1px solid var(--line);padding:38px 4vw;color:var(--muted);font-family:var(--serif);letter-spacing:.25em;text-transform:uppercase;font-size:.72rem}

@media(max-width:780px){.nav{padding:15px 4vw}.brand{font-size:1.05rem;letter-spacing:.34em}.menu-toggle{display:inline-flex;position:relative;z-index:2}nav ul{position:fixed;top:0;right:-100%;width:min(84vw,370px);height:100vh;flex-direction:column;align-items:flex-start;justify-content:center;padding:44px;gap:22px;background:rgba(0,0,0,.97);border-left:1px solid var(--line2);transition:right .34s}nav ul.active{right:0}nav a{font-size:.88rem;color:var(--text)}}
section{max-width:920px;margin:0 auto;padding:80px 4vw}
.sub-hero{min-height:46vh;padding:130px 4vw 56px;display:flex;align-items:flex-end;position:relative;overflow:hidden;border-bottom:1px solid var(--line);background:#000}
.sub-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 5% 85%,rgba(147,0,67,.1),transparent 38%);pointer-events:none}
.sub-inner{position:relative;z-index:1;max-width:920px;width:100%;margin:0 auto}
.back-link{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;color:var(--muted);text-decoration:none;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px;margin:0 0 24px;transition:.2s}
.back-link::before{content:"←";font-size:.8rem}.back-link:hover{color:var(--text)}
.sub-eyebrow{font-family:var(--mono);font-size:.6rem;letter-spacing:.24em;color:var(--muted);text-transform:uppercase;margin:0 0 12px}
.sub-h1{font-family:var(--serif);font-size:clamp(2.4rem,6vw,5.5rem);font-weight:400;letter-spacing:.1em;text-transform:uppercase;margin:0 0 16px;line-height:.95;text-shadow:2px 0 var(--m),-1px 0 rgba(0,215,239,.4)}

/* Posts */

.post-item{border-top:1px solid var(--line);padding:44px 0;position:relative}

.post-faixa{font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}

.nav-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding:28px 0;margin-top:60px;flex-wrap:wrap;gap:16px}

.post-item::before{color:#00d7ef}

<section>

    <p class="empty-state" id="emptyState">// silêncio</p>

  <div class="nav-footer">
    <a class="nav-link prev" href="transmissoes-poema.html">Poemas</a>
    <a class="nav-link next" href="transmissoes-personagem.html">Personagens</a>
  </div>

</div>
<footer><div class="footer-inner"><span>AMORFA.online</span><span class="pulse">sinal ativo</span></div></footer>

<script>

    const menuBtn=document.getElementById('menuBtn');
    const navMenu=document.getElementById('navMenu');
    if(menuBtn&&navMenu){
      menuBtn.addEventListener('click',()=>{navMenu.classList.toggle('active');menuBtn.textContent=navMenu.classList.contains('active')?'✕':'☰';});
      navMenu.querySelectorAll('a').forEach(l=>l.addEventListener('click',()=>{setTimeout(()=>{navMenu.classList.remove('active');menuBtn.textContent='☰';},80);}));
      document.addEventListener('click',e=>{if(navMenu.classList.contains('active')&&!navMenu.contains(e.target)&&e.target!==menuBtn){navMenu.classList.remove('active');menuBtn.textContent='☰';}});
    }
fetch('transmissoes.json')
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
  .then(data=>{
    const all = Array.isArray(data.posts) ? [...data.posts].reverse() : [];
    const mine = all.filter(p=>(p.tipo||'fragmento')==='verso');
    const list = document.getElementById('postsList');
    const empty = document.getElementById('emptyState');
    if(!mine.length) return;
    empty.style.display='none';
    list.innerHTML = mine.map(p=>{
      const titulo = p.titulo&&p.titulo.trim() ? `<h2 class="post-title">${p.titulo}</h2>` : '';
      const faixa  = p.faixa&&p.faixa.trim()   ? `<p class="post-faixa">faixa: ${p.faixa}</p>` : '';
      const imagem = p.imagem&&p.imagem.trim()  ? `<div class="post-img"><img src="${p.imagem}" alt="" loading="lazy"></div>` : '';
      const corpo  = (p.conteudo||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return `<div class="post-item"><p class="post-id">${p.id||''}</p>${imagem}${titulo}<p class="post-body">${corpo}</p>${faixa}</div>`;
    }).join('');
  }).catch(err=>{console.warn('tx fetch:',err);});
</script>
