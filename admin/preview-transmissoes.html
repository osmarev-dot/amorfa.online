<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex"><title>Preview Transmissões — AMORFA</title><style>
:root{color-scheme:dark;--bg:#090909;--ink:#eee8dc;--muted:#a79d91;--line:rgba(238,232,220,.16);--red:#b34a42}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Georgia,serif}.wrap{width:min(1180px,calc(100vw - 2rem));margin:0 auto;padding:2rem 0 4rem}.top{display:flex;justify-content:space-between;gap:1rem;align-items:center;margin-bottom:1.5rem}.top a{color:var(--ink);border:1px solid var(--line);padding:.55rem .8rem;text-decoration:none}h1{font-family:Georgia,serif;font-size:clamp(2rem,5vw,4rem);font-weight:400;letter-spacing:-.04em;margin:.2rem 0}.muted{color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem}.card{border:1px solid var(--line);background:rgba(255,255,255,.035);min-height:160px}.card img{width:100%;aspect-ratio:1/1;object-fit:cover;border-bottom:1px solid var(--line)}.card .body{padding:1rem}.label{font:14px Georgia,serif;letter-spacing:.10em;text-transform:uppercase;color:var(--red);margin-bottom:.55rem}.text{white-space:pre-wrap}.trans .card img{aspect-ratio:16/9}@media(max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:620px){.grid{grid-template-columns:1fr}.top{display:block}.top a{display:inline-block;margin-top:1rem}}
</style></head><body><main class="wrap trans"><div class="top"><div><p class="label">preview visual</p><h1>Transmissões</h1><p class="muted">Conferência visual dos posts publicados no JSON.</p></div><a href="index.html">Voltar ao CMS</a></div><section class="grid" id="grid"></section></main><script>
const grid=document.getElementById('grid');
const esc=s=>String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
fetch('../transmissoes.json').then(r=>r.json()).then(data=>{
  grid.innerHTML=(data.posts||[]).map(p=>`<article class="card">${p.imagem?`<img src="${p.imagem}" alt="${esc(p.imagemAlt||p.titulo)}">`:''}<div class="body"><div class="label">${esc(p.data)} · ${esc(p.tipo)}</div><h2>${esc(p.titulo)}</h2><div class="text">${esc((p.conteudo||'').slice(0,380))}${(p.conteudo||'').length>380?'…':''}</div></div></article>`).join('');
}).catch(e=>grid.innerHTML='<p class="muted">Não foi possível carregar transmissoes.json.</p>');
</script></body></html>
