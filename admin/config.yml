backend:
  name: github
  repo: osmarev-dot/amorfa.online
  branch: main
  base_url: https://amorfa-oauth.osmar-ev.workers.dev
  auth_endpoint: auth

media_folder: "assets/uploads"
public_folder: "/assets/uploads"
locale: pt

collections:
  - name: "transmissoes"
    label: "📡 Transmissões"
    files:
      - name: "posts"
        label: "Todas as Transmissões"
        file: "transmissoes.json"
        fields:
          - name: "posts"
            label: "Transmissões"
            widget: "list"
            summary: "{{fields.titulo}}"
            fields:
              - {label: "ID", name: "id", widget: "string", required: false, default: ""}
              - {label: "Título", name: "titulo", widget: "string", required: true}
              - {label: "Data", name: "data", widget: "datetime", required: false, format: "YYYY-MM-DD", date_format: "DD.MM.YYYY", time_format: false}
              - label: "Imagem opcional"
                name: "imagem"
                widget: "image"
                required: false
                media_folder: "/assets/uploads/transmissoes"
                public_folder: "/assets/uploads/transmissoes"
              - {label: "Conteúdo", name: "conteudo", widget: "text", required: true}
              - {label: "Faixa relacionada", name: "faixa", widget: "string", required: false, default: ""}
              - {label: "Player/link", name: "playerUrl", widget: "string", required: false, default: ""}

  - name: "fragmentos"
    label: "🧩 Fragmentos"
    description: "Alimenta o carrossel automático da Home."
    files:
      - name: "items"
        label: "Todos os Fragmentos"
        file: "fragmentos.json"
        fields:
          - name: "items"
            label: "Fragmentos"
            widget: "list"
            summary: "{{fields.texto}}"
            fields:
              - {label: "ID", name: "id", widget: "string", required: false, default: ""}
              - {label: "Texto / frase", name: "texto", widget: "text", required: false, default: ""}
              - label: "Imagem"
                name: "imagem"
                widget: "image"
                required: false
                media_folder: "/assets/uploads/fragmentos"
                public_folder: "/assets/uploads/fragmentos"
              - {label: "Tom", name: "tom", widget: "string", required: false, default: "fragmento"}
              - {label: "Data", name: "data", widget: "datetime", required: false, format: "YYYY-MM-DD", date_format: "DD.MM.YYYY", time_format: false}

  - name: "lancamentos"
    label: "💿 Discografia"
    files:
      - name: "releases"
        label: "Todos os lançamentos"
        file: "assets/data/releases.json"
        fields:
          - name: "items"
            label: "Lançamentos"
            widget: "list"
            summary: "{{fields.category}} — {{fields.title}}"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - label: "Categoria"
                name: "category"
                widget: "select"
                options:
                  - {label: "Álbum", value: "album"}
                  - {label: "EP", value: "ep"}
                  - {label: "Single", value: "single"}
              - {label: "Coleção/projeto", name: "collection", widget: "string", required: false, default: "avulso"}
              - {label: "Tipo público", name: "type", widget: "string", required: false, default: "SINGLE"}
              - {label: "Estado/eixo", name: "state", widget: "string", required: false, default: ""}
              - {label: "Título", name: "title", widget: "string", required: true}
              - {label: "Frase-eixo", name: "axis", widget: "string", required: false, default: ""}
              - {label: "Descrição", name: "description", widget: "text", required: false, default: ""}
              - label: "Capa"
                name: "image"
                widget: "image"
                required: false
                media_folder: "/assets/uploads/releases"
                public_folder: "/assets/uploads/releases"
              - {label: "Link para ouvir", name: "stream_url", widget: "string", required: false, default: ""}
              - {label: "Página própria", name: "page", widget: "string", required: false, default: ""}
              - label: "Faixas"
                name: "tracks"
                widget: "list"
                required: false
                field: {label: "Faixa", name: "track", widget: "string"}
