backend:
  name: github
  repo: osmarev-dot/amorfa.online
  branch: main
  base_url: https://amorfa-oauth.osmar-ev.workers.dev
  auth_endpoint: auth

media_folder: "assets/uploads"
public_folder: "/assets/uploads"
locale: pt

collections:
  - name: "fragmentos"
    label: "🧩 Fragmentos"
    description: "Alimenta a página estática Fragmentos com carrossel automático."
    files:
      - name: "items"
        label: "Todos os Fragmentos"
        file: "fragmentos.json"
        fields:
          - name: "items"
            label: "Fragmentos"
            widget: "list"
            summary: "{{fields.texto}}"
            fields:
              - {label: "Texto / frase", name: "texto", widget: "text", required: false, default: ""}
              - label: "Imagem"
                name: "imagem"
                widget: "image"
                required: false
                media_folder: "/assets/uploads/fragmentos"
                public_folder: "/assets/uploads/fragmentos"
              - {label: "Tom", name: "tom", widget: "string", required: false, default: "fragmento"}
              - {label: "Data", name: "data", widget: "datetime", required: false, format: "YYYY-MM-DD", date_format: "DD.MM.YYYY", time_format: false}

  - name: "transmissoes"
    label: "📡 Transmissões"
    files:
      - name: "posts"
        label: "Todas as Transmissões"
        file: "transmissoes.json"
        fields:
          - name: "posts"
            label: "Transmissões"
            widget: "list"
            summary: "{{fields.titulo}}"
            fields:
              - {label: "Título", name: "titulo", widget: "string", required: true}
              - {label: "Data", name: "data", widget: "datetime", required: false, format: "YYYY-MM-DD", date_format: "DD.MM.YYYY", time_format: false}
              - {label: "Conteúdo", name: "conteudo", widget: "text", required: true}
              - label: "Imagem opcional"
                name: "imagem"
                widget: "image"
                required: false
                media_folder: "/assets/uploads/transmissoes"
                public_folder: "/assets/uploads/transmissoes"
