<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex"><title>Preview Fragmentos — AMORFA</title><style>
:root{color-scheme:dark;--bg:#090909;--ink:#eee8dc;--muted:#a79d91;--line:rgba(238,232,220,.16);--red:#b34a42}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Georgia,serif}.wrap{width:min(1280px,calc(100vw - 2rem));margin:0 auto;padding:2rem 0 4rem}.top{display:flex;justify-content:space-between;gap:1rem;align-items:center;margin-bottom:1.5rem}.top a{color:var(--ink);border:1px solid var(--line);padding:.55rem .8rem;text-decoration:none}h1{font-family:Georgia,serif;font-size:clamp(2rem,5vw,4rem);font-weight:400;letter-spacing:-.04em;margin:.2rem 0}.muted{color:var(--muted)}.carousel{overflow:hidden;display:grid;gap:1rem}.lane{overflow:hidden;mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent)}.track{display:flex;align-items:center;gap:1rem;width:max-content;animation:drift 70s linear infinite}.lane:nth-child(2) .track{animation-direction:reverse;animation-duration:86s}.lane:nth-child(3) .track{animation-duration:100s}.carousel:hover .track{animation-play-state:paused}@keyframes drift{from{transform:translateX(0)}to{transform:translateX(-33.333%)}}.item{flex:0 0 auto;border:1px solid var(--line);background:rgba(255,255,255,.035);overflow:hidden}.image img{display:block;width:auto;max-width:min(58vw,560px);height:clamp(170px,25vw,350px);object-fit:contain;background:#000}.image.small img{height:clamp(130px,18vw,230px)}.image.large img{height:clamp(240px,32vw,440px)}.quote{width:clamp(240px,26vw,390px);min-height:190px;display:grid;place-items:center;padding:1.3rem;background:linear-gradient(145deg,rgba(15,15,17,.94),rgba(32,9,12,.58))}.quote blockquote{margin:0;font-size:clamp(1.4rem,2.5vw,2.3rem);line-height:1.04;white-space:pre-wrap}.label{font:14px Georgia,serif;letter-spacing:.10em;text-transform:uppercase;color:var(--red);margin-bottom:.55rem}@media(max-width:720px){.lane:nth-child(3){display:none}.image img{max-width:82vw;height:clamp(150px,52vw,270px)}.quote{width:78vw}}
</style></head><body><main class="wrap"><div class="top"><div><p class="label">preview visual</p><h1>Fragmentos</h1><p class="muted">Visual público: imagem sozinha ou frase sozinha. Sem ID, tom ou legenda no card.</p></div><a href="/admin/">Voltar ao CMS</a></div><section class="grid" id="grid"></section></main><script>
const grid=document.getElementById('grid');
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const br=s=>esc(s).replace(/\n/g,'<br>');
fetch('../fragmentos.json').then(r=>r.json()).then(data=>{
  const cards=[];
  const sizes=['wide','tall','small','large','square'];
  (data.items||[]).forEach((item,i)=>{
    const img=String(item.imagem||'').trim();
    const texto=item.texto||'';
    const modo=String(item.modo || (img?'imagem':'texto')).toLowerCase();
    if(modo==='texto'||!img){ if(texto) cards.push(`<article class="item quote"><blockquote>${br(texto)}</blockquote></article>`); return; }
    cards.push(`<a class="item image ${sizes[i%sizes.length]}" href="${esc(img)}" target="_blank" rel="noopener"><img src="${esc(img)}" alt="${esc(texto||item.id||'Fragmento')}"></a>`);
  });
  const lanes=[[],[],[]]; cards.forEach((c,i)=>lanes[i%3].push(c));
  grid.className='carousel';
  grid.innerHTML=lanes.map((lane,i)=>`<div class="lane"><div class="track">${[...lane,...lane,...lane].join('')}</div></div>`).join('');
}).catch(e=>grid.innerHTML='<p class="muted">Não foi possível carregar fragmentos.json.</p>');
</script></body></html>
