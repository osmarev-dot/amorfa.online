<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex"><title>Preview Fragmentos — AMORFA</title><style>
:root{color-scheme:dark;--bg:#090909;--ink:#eee8dc;--muted:#a79d91;--line:rgba(238,232,220,.16);--red:#b34a42}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Georgia,serif}.wrap{width:min(1440px,calc(100vw - 2rem));margin:0 auto;padding:2rem 0 4rem}.top{display:flex;justify-content:space-between;gap:1rem;align-items:center;margin-bottom:1.5rem}.top a{color:var(--ink);border:1px solid var(--line);padding:.55rem .8rem;text-decoration:none}h1{font-size:clamp(2rem,5vw,4rem);font-weight:400;letter-spacing:-.04em;margin:.2rem 0}.muted{color:var(--muted)}.carousel{overflow:hidden;display:grid;gap:.8rem}.lane{overflow:hidden;mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent)}.track{display:flex;align-items:center;gap:.75rem;width:max-content;animation:drift 62s linear infinite}.lane:nth-child(2) .track{animation-direction:reverse;animation-duration:76s}.lane:nth-child(3) .track{animation-duration:88s}.lane:nth-child(4) .track{animation-direction:reverse;animation-duration:96s}.carousel:hover .track{animation-play-state:paused}@keyframes drift{from{transform:translateX(0)}to{transform:translateX(-33.333%)}}.item{flex:0 0 auto;border:1px solid var(--line);background:rgba(255,255,255,.035);overflow:hidden}.image img{display:block;width:auto;max-width:min(42vw,400px);height:clamp(105px,14vw,220px);object-fit:contain;background:#000}.image.mini img{height:clamp(86px,10vw,160px);max-width:min(30vw,270px)}.image.tall img{height:clamp(150px,20vw,310px);max-width:min(34vw,320px)}.image.wide img{height:clamp(96px,12vw,185px);max-width:min(50vw,480px)}.quote{width:clamp(190px,20vw,330px);min-height:120px;display:grid;place-items:center;padding:1rem;background:linear-gradient(145deg,rgba(15,15,17,.94),rgba(32,9,12,.58))}.quote blockquote{margin:0;font-size:clamp(1.05rem,1.55vw,1.78rem);line-height:1.04;white-space:pre-wrap}.label{font-size:14px;letter-spacing:.10em;text-transform:uppercase;color:var(--red);margin-bottom:.55rem}@media(max-width:720px){.lane:nth-child(3),.lane:nth-child(4){display:none}.image img{max-width:68vw;height:clamp(118px,38vw,230px)}.quote{width:64vw}}
</style></head><body><main class="wrap"><div class="top"><div><p class="label">preview visual</p><h1>Fragmentos</h1><p class="muted">Imagem aparece sozinha. Frase aparece sozinha. Sem ID, tom ou legenda pública.</p></div><a href="/admin/">Voltar ao CMS</a></div><section class="carousel" id="grid"></section></main><script>
const grid=document.getElementById('grid');
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const br=s=>esc(s).replace(/\n/g,'<br>');
fetch('../fragmentos.json',{cache:'no-store'}).then(r=>r.json()).then(data=>{
  const cards=[]; const sizes=['wide','mini','tall','small','square','medium']; const quoteSizes=['small','wide','tall'];
  (data.items||[]).forEach((item,i)=>{
    const img=String(item.imagem||'').trim(); const texto=item.texto||''; const modo=String(item.modo || (img?'imagem':'texto')).toLowerCase();
    if(modo==='texto'||!img){ if(texto) cards.push(`<article class="item quote ${quoteSizes[i%quoteSizes.length]}"><blockquote>${br(texto)}</blockquote></article>`); return; }
    cards.push(`<a class="item image ${sizes[i%sizes.length]}" href="${esc(img)}" target="_blank" rel="noopener"><img src="${esc(img)}" alt="Fragmento visual AMORFA"></a>`);
  });
  const laneCount=cards.length>12?4:3; const lanes=Array.from({length:laneCount},()=>[]); cards.forEach((c,i)=>lanes[i%laneCount].push(c));
  grid.innerHTML=lanes.map((lane,i)=>`<div class="lane"><div class="track">${[...lane,...lane,...lane].join('')}</div></div>`).join('');
}).catch(e=>grid.innerHTML='<p class="muted">Não foi possível carregar fragmentos.json.</p>');
</script></body></html>
