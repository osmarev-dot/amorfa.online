<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex"><title>Preview Fragmentos — AMORFA</title><style>
:root{color-scheme:dark;--bg:#090909;--ink:#eee8dc;--muted:#a79d91;--line:rgba(238,232,220,.16);--red:#b34a42}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}.wrap{width:min(1180px,calc(100vw - 2rem));margin:0 auto;padding:2rem 0 4rem}.top{display:flex;justify-content:space-between;gap:1rem;align-items:center;margin-bottom:1.5rem}.top a{color:var(--ink);border:1px solid var(--line);padding:.55rem .8rem;text-decoration:none}h1{font-family:Georgia,serif;font-size:clamp(2rem,5vw,4rem);font-weight:400;letter-spacing:-.04em;margin:.2rem 0}.muted{color:var(--muted)}.grid{display:block;columns:3 260px;column-gap:1rem}.card{display:inline-block;width:100%;break-inside:avoid;margin:0 0 1rem;border:1px solid var(--line);background:rgba(255,255,255,.035);min-height:160px;overflow:hidden}.card a{display:block}.card img{width:100%;height:auto;object-fit:contain;border-bottom:1px solid var(--line)}.card .body{padding:1rem}.label{font:12px ui-monospace,monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:.55rem}.text{white-space:pre-wrap}.trans .card img{aspect-ratio:16/9}@media(max-width:900px){.grid{columns:2 240px}}@media(max-width:620px){.grid{columns:1}.top{display:block}.top a{display:inline-block;margin-top:1rem}}
</style></head><body><main class="wrap"><div class="top"><div><p class="label">preview visual</p><h1>Fragmentos</h1><p class="muted">Use esta página para conferir as imagens sem depender do painel lateral do CMS.</p></div><a href="/admin/">Voltar ao CMS</a></div><section class="grid" id="grid"></section></main><script>
const grid=document.getElementById('grid');
const esc=s=>String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
fetch('../fragmentos.json').then(r=>r.json()).then(data=>{
  grid.innerHTML=(data.items||[]).map(item=>`<article class="card">${item.imagem?`<a href="${item.imagem}" target="_blank" rel="noopener"><img src="${item.imagem}" alt="${esc(item.texto||item.id)}"></a>`:''}<div class="body"><div class="label">${esc(item.id)} · ${esc(item.tom)} · ${esc(item.modo)}</div><div class="text">${esc(item.texto||'sem texto')}</div></div></article>`).join('');
}).catch(e=>grid.innerHTML='<p class="muted">Não foi possível carregar fragmentos.json.</p>');
</script></body></html>
