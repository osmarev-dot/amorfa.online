  <style>
:root {
  /* Colors */
  --black:   #000;
  --bg:      #030303;
  --panel:   #080808;
  --text:    #f2f0ed;
  --muted:   #6a6460;
  --soft:    #9e9893;
  --line:    rgba(255,255,255,.08);
  --line2:   rgba(255,255,255,.15);
  --m:       #930043;
  --m2:      #d00066;
  --c:       #00d7ef;
  --c2:      #008293;

  /* Type */
  --serif: 'Cinzel', 'Times New Roman', serif;
  --body:  'Cormorant Garamond', Georgia, serif;
  --mono:  'Courier New', Courier, monospace;

  /* Space scale */
  --s1: 8px;
  --s2: 16px;
  --s3: 24px;
  --s4: 32px;
  --s5: 48px;
  --s6: 64px;
  --s7: 96px;
  --s8: 128px;

  /* Max widths */
  --mw: 1440px;
  --mw-text: 720px;
}

*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; background: var(--black); color: var(--text); -webkit-font-smoothing: antialiased; }
body { margin: 0; background: var(--black); font-family: var(--body); overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
button { cursor: pointer; font: inherit; }

/* CRT scanlines */
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background:
    linear-gradient(rgba(255,255,255,0) 50%, rgba(0,0,0,.18) 50%),
    linear-gradient(90deg, rgba(147,0,67,.02), rgba(0,130,147,.015));
  background-size: 100% 4px, 8px 100%;
  mix-blend-mode: screen; opacity: .4;
}

/* Film grain */
body::after {
  content: ""; position: fixed; inset: -20%; pointer-events: none; z-index: 9998; opacity: .04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: grain 1.6s steps(3) infinite;
}
@keyframes grain {
  0%   { transform: translate(0,0); }
  33%  { transform: translate(2%,-1%); }
  66%  { transform: translate(-1%,2%); }
  100% { transform: translate(0,0); }
}

header {
  position: fixed; inset: 0 0 auto; z-index: 2000;
  background: rgba(0,0,0,.82); border-bottom: 1px solid var(--line);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.nav {
  max-width: var(--mw); margin: 0 auto; padding: 0 4vw;
  height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 32px;
}
.brand {
  font-family: var(--serif); font-size: 1.1rem; letter-spacing: .5em;
  text-transform: uppercase; flex-shrink: 0; position: relative;
}
.brand::after {
  content: ""; position: absolute; left: 0; bottom: -4px;
  width: 32px; height: 1px; background: var(--m2);
}
.nav-links { margin: 0; padding: 0; list-style: none; display: flex; gap: 28px; align-items: center; }
.nav-links a {
  font-family: var(--serif); font-size: .58rem; letter-spacing: .2em;
  text-transform: uppercase; color: var(--muted); transition: color .2s;
  white-space: nowrap;
}
.nav-links a:hover,
.nav-links a.active { color: var(--text); }
.nav-links a.active { border-bottom: 1px solid var(--m2); padding-bottom: 1px; }
.menu-toggle {
  display: none; border: 1px solid var(--line2); background: transparent;
  color: var(--text); width: 40px; height: 40px; font-size: 1rem; flex-shrink: 0;
}

.btn {
  display: inline-flex; align-items: center; justify-content: space-between;
  gap: 12px; min-height: 52px; padding: 12px 20px;
  border: 1px solid var(--line2); background: rgba(255,255,255,.03);
  color: var(--text); font-family: var(--serif); font-size: .68rem;
  letter-spacing: .22em; text-transform: uppercase; transition: .22s;
  white-space: nowrap;
}
.btn:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.28); }
.btn-icon { font-size: 1rem; flex-shrink: 0; }
.btn-spotify { border-color: rgba(30,215,96,.25); background: rgba(30,215,96,.04); }
.btn-spotify:hover { background: rgba(30,215,96,.1); border-color: rgba(30,215,96,.5); }
.btn-album  { border-color: rgba(208,0,102,.25); background: rgba(208,0,102,.04); }
.btn-album:hover  { background: rgba(208,0,102,.1); border-color: rgba(208,0,102,.5); }
.btn-primary { border-color: rgba(208,0,102,.4); }

.wrap { max-width: var(--mw); margin: 0 auto; padding: 0 4vw; }
.section { padding: var(--s7) 4vw; max-width: var(--mw); margin: 0 auto; }
.section-sm { padding: var(--s6) 4vw; max-width: var(--mw); margin: 0 auto; }

.section-head {
  display: grid; grid-template-columns: 1fr max-content; gap: var(--s4);
  align-items: end; margin-bottom: var(--s6);
  border-bottom: 1px solid var(--line); padding-bottom: var(--s3);
}
.section-title {
  margin: 0; font-family: var(--serif);
  font-size: clamp(1.6rem, 3.2vw, 3rem); font-weight: 400;
  letter-spacing: .12em; text-transform: uppercase;
}
.section-note {
  margin: 0; font-family: var(--mono); font-size: .68rem;
  letter-spacing: .06em; color: var(--muted); line-height: 1.6; text-align: right;
}

/* Dividers */
.divider { border: none; border-top: 1px solid var(--line); margin: 0; }

/* Nav strip */
.nav-strip { border-bottom: 1px solid var(--line); background: var(--bg); }
.nav-strip-inner {
  max-width: var(--mw); margin: 0 auto;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  border-left: 1px solid var(--line);
}
.strip-card {
  padding: var(--s3) var(--s3); border-right: 1px solid var(--line);
  text-decoration: none; display: flex; flex-direction: column;
  justify-content: center; gap: 5px; min-height: 76px;
  background: rgba(255,255,255,.01); transition: background .2s;
  position: relative; overflow: hidden;
}
.strip-card::after {
  content: ""; position: absolute; left: 0; bottom: 0; width: 100%; height: 1px;
  background: linear-gradient(90deg, var(--m2), var(--c), transparent);
  transform: translateX(-85%); transition: transform .3s ease;
}
.strip-card:hover { background: rgba(255,255,255,.04); }
.strip-card:hover::after { transform: translateX(0); }
.strip-label { font-family: var(--mono); font-size: .52rem; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); }
.strip-title { font-family: var(--serif); font-size: .9rem; font-weight: 400; letter-spacing: .06em; color: var(--text); }

/* Chip */
.chip {
  display: inline-block; border: 1px solid var(--line2); padding: 5px 10px;
  font-family: var(--mono); font-size: .6rem; letter-spacing: .12em;
  text-transform: uppercase; color: var(--muted);
}

.page-hero {
  min-height: 48vh; padding: 64px 4vw 0;
  display: flex; align-items: flex-end;
  border-bottom: 1px solid var(--line); position: relative; overflow: hidden;
  background: var(--black);
}
.page-hero::before {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(circle at 5% 90%, rgba(147,0,67,.1), transparent 40%),
    radial-gradient(circle at 92% 12%, rgba(0,130,147,.06), transparent 36%);
}
.page-hero-inner {
  position: relative; z-index: 1;
  max-width: var(--mw); width: 100%; margin: 0 auto; padding-bottom: var(--s6);
}
.page-eyebrow {
  font-family: var(--mono); color: var(--muted); font-size: .62rem;
  letter-spacing: .32em; text-transform: uppercase; margin: 0 0 var(--s3);
  display: flex; align-items: center; gap: 12px;
}
.page-eyebrow::before { content: ""; display: block; width: 22px; height: 1px; background: var(--m2); }
.page-h1 {
  font-family: var(--serif); font-weight: 400; letter-spacing: .1em;
  text-transform: uppercase; margin: 0; line-height: .9;
  font-size: clamp(2.8rem, 8vw, 7.5rem);
  text-shadow: 2px 0 var(--m), -1px 0 rgba(0,215,239,.4);
}
.page-sub {
  margin: var(--s4) 0 0; font-size: clamp(.92rem, 1.6vw, 1.2rem);
  font-style: italic; color: var(--soft); line-height: 1.55; max-width: 560px;
}

footer {
  border-top: 1px solid var(--line); padding: var(--s5) 4vw;
  color: var(--muted); font-family: var(--serif);
  letter-spacing: .25em; text-transform: uppercase; font-size: .65rem;
}
.footer-inner { max-width: var(--mw); margin: 0 auto; display: flex; justify-content: space-between; gap: var(--s3); }
.pulse { color: var(--m2); }

.contact-box {
  display: grid; grid-template-columns: 1fr auto; gap: var(--s4);
  align-items: center; border: 1px solid var(--line); padding: var(--s5);
  background: var(--bg);
}
.contact-email {
  font-family: var(--serif); font-size: clamp(1.1rem, 2.2vw, 1.8rem);
  letter-spacing: .06em; border-bottom: 1px solid var(--m2); padding-bottom: 4px;
  width: fit-content; transition: color .2s, border-color .2s;
}
.contact-email:hover { color: var(--c); border-color: var(--c); }
.contact-tag {
  font-family: var(--mono); color: var(--muted); font-size: .62rem;
  letter-spacing: .18em; text-transform: uppercase; white-space: nowrap;
}

@media (max-width: 1100px) {
  .hero-inner { grid-template-columns: 1fr; gap: var(--s5); padding: var(--s6) 0; }
  .hero-right { border-left: none; border-top: 1px solid var(--line2); padding: var(--s4) 0 0; }
  .album-card, .album-card:nth-child(even) { grid-template-columns: 1fr; }
  .album-card:nth-child(even) .album-art { order: 0; }
  .album-art { min-height: 320px; }
  .modal-grid { grid-template-columns: 1fr; }
  .modal-img img { min-height: auto; max-height: 340px; }
  .tracklist { columns: 1; }
  .section-head { grid-template-columns: 1fr; }
  .section-note { text-align: left; }
  .contact-box { grid-template-columns: 1fr; }
}

@media (max-width: 780px) {
  :root { --s7: 64px; --s6: 48px; }
  .nav { padding: 0 4vw; height: 56px; }
  .brand { font-size: .95rem; letter-spacing: .4em; }
  .nav-links { display: none; }
  .menu-toggle { display: flex; align-items: center; justify-content: center; }
  .nav-links.open {
    display: flex; position: fixed; inset: 0; flex-direction: column;
    align-items: flex-start; justify-content: center;
    padding: var(--s6) 4vw; gap: var(--s4);
    background: rgba(0,0,0,.96); z-index: 1999;
    border-right: 1px solid var(--line2);
    width: min(84vw, 360px);
  }
  .nav-links.open a { font-size: .82rem; color: var(--text); }
  .hero { min-height: auto; }
  .hero-inner { padding: var(--s5) 0; }
  .section { padding: var(--s6) 4vw; }
  .section-sm { padding: var(--s5) 4vw; }
  .page-hero { min-height: auto; padding-bottom: 0; }
  .page-hero-inner { padding-bottom: var(--s5); }
  .album-body { padding: var(--s4); }
  .album-body::before { top: var(--s4); left: var(--s4); }
  .album-chips { padding-top: var(--s4); }
  .modal { padding: var(--s2); }
  .modal-body { padding: var(--s4); }
  .footer-inner { flex-direction: column; gap: var(--s2); }
  .nav-strip-inner { grid-template-columns: 1fr 1fr; }
  .strip-card:nth-child(odd) { border-left: 1px solid var(--line); }
}

.sub-hero-inner { max-width: var(--mw-text); }
.poems-area { max-width: var(--mw-text); }
.poem { border-top: 1px solid var(--line); padding: var(--s6) 0 0; margin-bottom: var(--s6); position: relative; }
.poem::before {
  content: ""; position: absolute; top: 0; left: 0; width: 1px; height: 36px;
  background: var(--m2); box-shadow: 0 0 10px var(--m2);
}
.poem-title {
  font-family: var(--serif); font-size: .72rem; letter-spacing: .2em;
  text-transform: uppercase; color: var(--muted); margin: 0 0 var(--s3);
}
.poem-body {
  font-family: var(--body); font-size: clamp(.9rem,1.5vw,1.08rem);
  line-height: 1.9; color: rgba(242,240,237,.82); white-space: pre-line; margin: 0;
}
.sub-empty { padding: var(--s7) 0; font-family: var(--mono); font-size: .58rem; letter-spacing: .2em; color: #1e1e1e; }
.sub-nav { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--line); padding: var(--s4) 0; margin-top: var(--s6); flex-wrap: wrap; gap: var(--s3); }
.sub-nav-link { font-family: var(--mono); font-size: .58rem; letter-spacing: .18em; color: var(--muted); text-decoration: none; text-transform: uppercase; transition: color .2s; }
.sub-nav-link:hover { color: var(--text); }
.sub-nav-link.prev::before { content: "← "; }
.sub-nav-link.next::after { content: " →"; }
.poem::before{background:var(--c);box-shadow:0 0 10px var(--c)}</style>
</head>
<body>
<header>
  <nav class="nav" aria-label="Navegação principal">
    <a class="brand" href="index.html#inicio">AMORFA</a>
    <ul class="nav-links" id="navLinks" role="list">
      <li><a href="index.html#inicio">Início</a></li>
        <li><a href="ouvir.html">Ouvir</a></li>
        <li><a href="onde-se-guarda.html">Onde Se Guarda</a></li>
        <li><a href="ep.html">EP</a></li>
        <li><a href="transmissoes.html">Transmissões</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="index.html#contato">Contato</a></li>
    </ul>
    <button class="menu-toggle" id="menuBtn" aria-expanded="false" aria-label="Abrir menu">☰</button>
  </nav>
</header>
<main>
  <div class="page-hero">
    <div class="page-hero-inner sub-hero-inner">
      <a href="estratos.html" style="font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;display:inline-flex;align-items:center;gap:8px;margin:0 0 var(--s4)">← Estratos</a>
      <p style="font-family:var(--mono);font-size:.6rem;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin:0 0 var(--s2)">Est. Coda</p>
      <h1 class="page-h1" style="font-size:clamp(1.8rem,5vw,4.5rem)">Poemas Avulsos</h1>
      <p class="page-sub" style="font-style:italic;">"o que não cabe nos estratos ainda pertence ao arquivo."</p>
    </div>
  </div>
  <div class="section">
    <div class="poems-area" id="poems">
      <p class="sub-empty" id="emptyState">// silêncio</p>
    </div>
    <div class="sub-nav">
      <a class="sub-nav-link prev" href="estrato-vi.html">A Criança-Cripta</a>
      
    </div>
  </div>
</main>
<footer>
  <div class="footer-inner">
    <span>AMORFA.online</span>
    <span class="pulse">sinal ativo</span>
  </div>
</footer>
<script>
(function(){
  const btn = document.getElementById('menuBtn');
  const links = document.getElementById('navLinks');
  if (!btn || !links) return;
  btn.addEventListener('click', () => {
    const open = links.classList.toggle('open');
    btn.setAttribute('aria-expanded', open);
    btn.textContent = open ? '✕' : '☰';
    document.body.style.overflow = open ? 'hidden' : '';
  });
  links.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
    setTimeout(() => {
      links.classList.remove('open');
      btn.textContent = '☰';
      btn.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }, 80);
  }));
  document.addEventListener('click', e => {
    if (links.classList.contains('open') && !links.contains(e.target) && e.target !== btn) {
      links.classList.remove('open');
      btn.textContent = '☰';
      btn.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }
  });
})();

fetch('estratos.json')
  .then(r=>r.json())
  .then(data=>{
    const mine=(Array.isArray(data.posts)?data.posts:[]).filter(p=>p.estrato==='coda');
    const area=document.getElementById('poems');
    const empty=document.getElementById('emptyState');
    if(!mine.length)return;
    empty.style.display='none';
    area.innerHTML=mine.map(p=>{
      const titulo=p.titulo&&p.titulo.trim()?`<p class="poem-title">${p.titulo}</p>`:'';
      const corpo=(p.conteudo||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return `<div class="poem">${titulo}<p class="poem-body">${corpo}</p></div>`;
    }).join('');
  }).catch(()=>{});</script>
</body>
