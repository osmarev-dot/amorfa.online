  <style>:root{--m:#930043;--m2:#d00066;--c:#00d7ef;--c2:#008293;--line:rgba(255,255,255,.10);--line2:rgba(255,255,255,.18);--text:#f2f0ed;--muted:#77726f;--soft:#aaa29e;--serif:'Cinzel','Times New Roman',serif;--body:'Cormorant Garamond',Georgia,serif;--mono:'Courier New',Courier,monospace}
*{box-sizing:border-box}html{scroll-behavior:smooth;background:#000;color:var(--text)}body{margin:0;background:#000;font-family:var(--body);overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;background:linear-gradient(rgba(255,255,255,0) 50%,rgba(0,0,0,.22) 50%),linear-gradient(90deg,rgba(147,0,67,.025),rgba(0,130,147,.018));background-size:100% 4px,7px 100%;mix-blend-mode:screen;opacity:.36}
body::after{content:"";position:fixed;inset:-20%;pointer-events:none;z-index:9998;opacity:.045;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:grain 1.4s steps(3) infinite}
@keyframes grain{0%{transform:translate(0,0)}33%{transform:translate(2%,-1%)}66%{transform:translate(-1%,2%)}100%{transform:translate(0,0)}}
a{color:inherit}
header{position:fixed;inset:0 0 auto;z-index:2000;background:rgba(0,0,0,.74);border-bottom:1px solid var(--line);backdrop-filter:blur(16px)}
.nav{max-width:1500px;margin:0 auto;padding:18px 4vw;display:flex;align-items:center;justify-content:space-between;gap:26px}
.brand{font-family:var(--serif);font-size:1.32rem;letter-spacing:.45em;text-decoration:none}
.brand::after{content:"";display:block;width:42px;height:1px;background:rgba(208,0,102,.65);margin-top:8px}
nav ul{margin:0;padding:0;display:flex;list-style:none;gap:22px}
nav a{font-family:var(--serif);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:.2s}
nav a:hover,nav a.active{color:var(--text)}nav a.active{border-bottom:1px solid var(--m);padding-bottom:2px}
.menu-toggle{display:none;border:1px solid var(--line2);background:#000;color:var(--text);padding:10px 13px;font-size:1rem;cursor:pointer}
footer{border-top:1px solid var(--line);padding:38px 4vw;color:var(--muted);font-family:var(--serif);letter-spacing:.25em;text-transform:uppercase;font-size:.72rem}
.footer-inner{max-width:1500px;margin:0 auto;display:flex;justify-content:space-between;gap:20px}
.pulse{color:var(--m2)}
@media(max-width:780px){.nav{padding:15px 4vw}.brand{font-size:1.05rem;letter-spacing:.34em}.menu-toggle{display:inline-flex;position:relative;z-index:2}nav ul{position:fixed;top:0;right:-100%;width:min(84vw,370px);height:100vh;flex-direction:column;align-items:flex-start;justify-content:center;padding:44px;gap:22px;background:rgba(0,0,0,.97);border-left:1px solid var(--line2);transition:right .34s}nav ul.active{right:0}nav a{font-size:.88rem;color:var(--text)}}
.sub-hero{min-height:40vh;padding:130px 4vw 52px;display:flex;align-items:flex-end;position:relative;overflow:hidden;border-bottom:1px solid var(--line);background:#000}
.sub-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 5% 85%,rgba(147,0,67,.1),transparent 38%);pointer-events:none}
.sub-inner{position:relative;z-index:1;max-width:1500px;width:100%;margin:0 auto}
.back-link{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;color:var(--muted);text-decoration:none;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px;margin:0 0 22px;transition:.2s}
.back-link::before{content:"←";font-size:.8rem}.back-link:hover{color:var(--text)}
.sub-eyebrow{font-family:var(--mono);font-size:.6rem;letter-spacing:.24em;color:var(--muted);text-transform:uppercase;margin:0 0 10px}
.sub-h1{font-family:var(--serif);font-size:clamp(2.8rem,7vw,6rem);font-weight:400;letter-spacing:.1em;text-transform:uppercase;margin:0;line-height:.95;text-shadow:2px 0 var(--m),-1px 0 rgba(0,215,239,.4)}
section{max-width:1500px;margin:0 auto;padding:72px 4vw 100px}
/* Archive list */
.archive{display:grid;gap:0}
.archive-item{border-top:1px solid var(--line);position:relative}
.archive-item:last-child{border-bottom:1px solid var(--line)}
/* Header row — always visible */
.arch-header{display:grid;grid-template-columns:1fr auto;align-items:center;gap:20px;padding:22px 0;cursor:pointer;transition:.2s}
.arch-header:hover .arch-title{color:var(--text)}
.arch-meta{display:flex;align-items:center;gap:16px}
.arch-title{font-family:var(--serif);font-size:clamp(1rem,1.8vw,1.4rem);font-weight:400;letter-spacing:.05em;color:var(--soft);transition:.2s;margin:0}
.arch-item.open .arch-title{color:var(--text)}
.arch-date{font-family:var(--mono);font-size:.55rem;letter-spacing:.18em;color:#2a2a2a;white-space:nowrap;text-transform:uppercase}
.arch-chevron{font-family:var(--mono);font-size:.7rem;color:var(--muted);transition:transform .3s;flex-shrink:0}
.arch-item.open .arch-chevron{transform:rotate(180deg)}
/* Body — accordion */
.arch-body{overflow:hidden;max-height:0;transition:max-height .4s ease}
.arch-item.open .arch-body{max-height:4000px}
.arch-content{padding:0 0 36px 0;border-top:1px solid rgba(255,255,255,.04)}
.arch-img{margin:24px 0;max-width:460px}
.arch-img img{width:100%;height:auto;display:block;filter:grayscale(80%) contrast(1.08)}
.arch-text{font-family:var(--body);font-size:clamp(.9rem,1.5vw,1.1rem);line-height:1.88;color:rgba(242,240,237,.82);white-space:pre-line;margin:22px 0 0}
.arch-faixa{font-family:var(--mono);font-size:.56rem;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
/* Accent bar */
.archive-item::before{content:"";position:absolute;top:0;left:0;width:1px;height:0;transition:height .3s ease;background:var(--acc,var(--m2));box-shadow:0 0 8px var(--acc,var(--m2))}
.arch-item.open::before{height:100%}
/* Empty */
.empty-state{padding:80px 0;font-family:var(--mono);font-size:.6rem;letter-spacing:.22em;color:#1a1a1a;text-transform:lowercase}
.nav-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding:28px 0;margin-top:60px;flex-wrap:wrap;gap:16px}
.nav-link{font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;color:var(--muted);text-decoration:none;text-transform:uppercase;transition:.2s}
.nav-link:hover{color:var(--text)}.nav-link.prev::before{content:"← "}.nav-link.next::after{content:" →"}
  .archive-item{--acc:#d00066}
  .sub-h1{text-shadow:2px 0 #d00066,-1px 0 rgba(0,215,239,.4)}
  </style>

<script>

    const menuBtn=document.getElementById('menuBtn');
    const navMenu=document.getElementById('navMenu');
    if(menuBtn&&navMenu){
      menuBtn.addEventListener('click',()=>{navMenu.classList.toggle('active');menuBtn.textContent=navMenu.classList.contains('active')?'✕':'☰';});
      navMenu.querySelectorAll('a').forEach(l=>l.addEventListener('click',()=>{setTimeout(()=>{navMenu.classList.remove('active');menuBtn.textContent='☰';},80);}));
      document.addEventListener('click',e=>{if(navMenu.classList.contains('active')&&!navMenu.contains(e.target)&&e.target!==menuBtn){navMenu.classList.remove('active');menuBtn.textContent='☰';}});
    }
fetch('transmissoes.json')
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
  .then(data=>{
    const all=Array.isArray(data.posts)?[...data.posts].reverse():[];
    const mine=all.filter(p=>(p.tipo||'sinal')==='sinal');
    const list=document.getElementById('archiveList');
    const empty=document.getElementById('emptyState');
    if(!mine.length)return;
    empty.style.display='none';
    list.innerHTML=mine.map((p,i)=>{
      const titulo=p.titulo&&p.titulo.trim()?p.titulo:'// sem título';
      const data_str=p.data||p.id||'';
      const corpo=(p.conteudo||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const imagem=p.imagem&&p.imagem.trim()?`<div class="arch-img"><img src="${p.imagem}" alt="" loading="lazy"></div>`:'';
      const faixa=p.faixa&&p.faixa.trim()?`<p class="arch-faixa">faixa: ${p.faixa}</p>`:'';
      const openClass=i===0?' open':'';
      return `<div class="archive-item arch-item${openClass}">
        <div class="arch-header" onclick="toggle(this.parentElement)">
          <div class="arch-meta">
            <h2 class="arch-title">${titulo}</h2>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <span class="arch-date">${data_str}</span>
            <span class="arch-chevron">▾</span>
          </div>
        </div>
        <div class="arch-body">
          <div class="arch-content">
            ${imagem}
            <p class="arch-text">${corpo}</p>
            ${faixa}
          </div>
        </div>
      </div>`;
    }).join('');
  }).catch(err=>{console.warn('tx fetch:',err);});

function toggle(item){
  const isOpen=item.classList.contains('open');
  item.classList.toggle('open',!isOpen);
}
</script>
