      justify-content: center;
      gap: 36px;
      margin-bottom: 32px;

    .icon-link {
      display: flex; align-items: center; justify-content: center;
      width: 64px; height: 64px;

      object-fit: contain;

    .icon-link.icon-sm { width: 44px; height: 44px; }
    @keyframes iconGlitch {
      0%,100% { filter: none; transform: translate(0,0); }
      15% { filter: drop-shadow(-3px 0 rgba(255,0,80,.8)) drop-shadow(3px 0 rgba(0,200,255,.6)); transform: translate(-2px,0); }
      30% { filter: drop-shadow(3px 0 rgba(255,0,80,.6)) drop-shadow(-2px 0 rgba(0,200,255,.8)); transform: translate(2px,1px); }
      45% { filter: none; transform: translate(0,0); }
      55% { filter: drop-shadow(-2px 0 rgba(255,0,80,.4)) drop-shadow(2px 0 rgba(0,200,255,.4)); transform: translate(-1px,0); }
      70% { filter: drop-shadow(0 0 16px rgba(111,168,216,.5)); transform: translate(1px,0); }
      85% { filter: none; transform: translate(0,0); }
    }
    .icon-link:hover img {
      animation: iconGlitch 0.35s steps(1) 1 forwards;
    }
    @media (max-width:980px) {
      .ouvir-center { min-height: calc(100vh - 80px); padding: 30px 16px !important; }
      .ouvir-title { margin-bottom: 40px; }
      .icon-row { gap: 24px; margin-bottom: 24px; }
      .icon-link { width: 48px; height: 48px; }
      .icon-link.icon-sm { width: 34px; height: 34px; }
    }
    @media (max-width:560px) {

      .icon-link { width: 42px; height: 42px; }
      .icon-link.icon-sm { width: 30px; height: 30px; }
